name: AI PR Review POC

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to review
        required: true
        type: string
      base_branch:
        description: Base branch name for metadata
        required: false
        default: main
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build CLI
        run: ./mvnw -q -DskipTests package

      - name: Resolve review context
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
            echo "BASE_BRANCH=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_ENV"
          else
            echo "PR_NUMBER=${{ inputs.pull_request_number }}" >> "$GITHUB_ENV"
            echo "BASE_BRANCH=${{ inputs.base_branch }}" >> "$GITHUB_ENV"
          fi

      - name: Run PR review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_BASE_BRANCH: ${{ env.BASE_BRANCH }}
        run: |
          java -jar target/ai-pr-reviewer-poc.jar \
            review \
            --config config/application.example.yml \
            --github-pr "${PR_NUMBER}" \
            --provider openai \
            --output-format markdown
